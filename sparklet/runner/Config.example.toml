[connections]
# valid values: "usb", "din" or "none"
midi = "usb"
# valid values: "usb", "none"
audio = "usb"
[features]
octave_filter = true
configurable = true

[parameters]
polyphony = 16

[initial_config]
# All values in this section are in the range 0 to 255
attack = 40
sustain = 127
decay_release = 200
# Wavetable depends on the value mod 4
#   0 => Sine
#   1 => Saw
#   2 => Square
#   3 => Triangle
oscilator_type = 1
# Equalizer
f250hz = 200
f500hz = 200
f1000hz = 200
f2000hz = 200
f4000hz = 200
f8000hz = 200
